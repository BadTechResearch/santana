name: Feature request
description: Suggest an idea for Santana
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea! Please check [existing issues](https://github.com/BadTechResearch/santana/issues) first.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What do you want to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New tool / integration
        - Performance improvement
        - Documentation
        - Bug fix (use bug report instead)
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have checked that this feature is not already requested
          required: true
