name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-cov

      - name: Lint — no bare except
        run: |
          ! grep -rn '^\s*except\s*:' core/ tests/ tools/ scripts/ 2>/dev/null | grep -v test_

      - name: Lint — rate limit decorator présent
        run: |
          python3 scripts/check_rate_limit.py

      - name: Test — unitaires isolés (sans API)
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_deepseek_client.py \
            --ignore=tests/test_100_autonomie.py \
            --ignore=tests/test_100_closure.py \
            --ignore=tests/test_100_frugalite.py \
            --ignore=tests/test_100_memoire.py \
            --ignore=tests/test_100_performances.py \
            --ignore=tests/test_planner.py \
            --ignore=tests/test_react_loop.py \
            -v --tb=short --timeout=60

      - name: Test — compilation tous les .py
        run: |
          python3 scripts/check_compile.py

      - name: Coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_deepseek_client.py \
            --ignore=tests/test_100_autonomie.py \
            --ignore=tests/test_100_closure.py \
            --ignore=tests/test_100_frugalite.py \
            --ignore=tests/test_100_memoire.py \
            --ignore=tests/test_100_performances.py \
            --ignore=tests/test_planner.py \
            --ignore=tests/test_react_loop.py \
            --cov=core --cov=tools --cov=agent --cov=scripts --cov-report=term-missing
